[build]
  publish = "."

# Clean URLs: /privacy serves privacy.html
[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/delete"
  to = "/delete.html"
  status = 200

[[redirects]]
  from = "/auth-callback"
  to = "/auth-callback.html"
  status = 200

# Serve the WebGL game at /play
[[redirects]]
  from = "/play"
  to = "/play/index.html"
  status = 200
